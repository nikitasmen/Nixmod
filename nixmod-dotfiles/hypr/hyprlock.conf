# Background for both monitors (~ expands to $HOME)
background {
  path = ~/Pictures/wallpapers/Sun-Setting-Horizon.png
  color = rgba(36, 39, 58, 1.0) # Base
  blur_passes = 3
  blur_size = 8
}

# Avatar/Profile Picture
image {
  path = ~/Pictures/avatar.png
  size = 120
  border_color = rgba(c6a0f6ff) # Mauve
  border_size = 4
  position = 0, 80
  halign = center
  valign = center
}

# Clock label
label {
  text = $TIME
  color = rgba(202, 211, 245, 1.0) # Text
  font_size = 80
  font_family = JetBrainsMono Nerd Font ExtraBold
  position = 0, 20%
  halign = center
  valign = center
}

# Date label
label {
  text = cmd[update:43200000] echo "$(date +'%A, %B %d')"
  color = rgba(166, 218, 149, 1.0) # Green
  font_size = 24
  font_family = JetBrainsMono Nerd Font Bold
  position = 0, 10%
  halign = center
  valign = center
}

# Track title and artist (shown at top center)
label {
  text = cmd[update:2000] echo "$(playerctl metadata artist) - $(playerctl metadata title)"
  color = rgba(138, 173, 244, 1.0) # Blue
  font_size = 16
  font_family = JetBrainsMono Nerd Font
  position = 0, -40
  halign = center
  valign = top
}

input-field {
  size = 300, 50
  outline_thickness = 3
  dots_size = 0.33
  dots_spacing = 0.15
  dots_center = true
  outer_color = rgba(198, 160, 246, 1.0) # Mauve
  inner_color = rgba(36, 39, 58, 0.8) # Base
  font_color = rgba(202, 211, 245, 1.0) # Text
  fade_on_empty = false
  placeholder_text = <i>󰌾 Enter Password...</i>
  hide_input = false
  position = 0, -50
  halign = center
  valign = center
}
