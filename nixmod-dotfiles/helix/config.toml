# Helix editor configuration
# https://docs.helix-editor.com/configuration.html

theme = "catppuccin_macchiato"

[editor]
line-number = "relative"
cursorline = true
cursorcolumn = true
color-modes = true
true-color = true
bufferline = "multiple"
rulers = [80, 120]
soft-wrap.enable = false
indent-guides.render = true
auto-format = true
auto-save = true

# Clipboard via clipse (`clipse -c` / `clipse -p`) so copies match clipse + `clipse -listen` history.
[editor.clipboard-provider.custom]
yank = { command = "clipse", args = ["-p"] }
paste = { command = "clipse", args = ["-c"] }

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.statusline]
    left = [
    "mode",
    "spinner",
    "version-control",
    "spacer",
    "separator",
    "file-name",
    "read-only-indicator",
    "file-modification-indicator",

    ]
    center = []
    right = [
    "diagnostics",
    "workspace-diagnostics",
    "position",
    "total-line-numbers",
    "position-percentage",
    "file-encoding",
    "file-line-ending",
    "file-type",
    "register",
    "selections",
    ]
    separator = "│"

[editor.lsp]
    display-messages = true
    display-inlay-hints = true

[editor.whitespace]
render = "all"

# File explorer (Space+e / Space+E): use file-picker ignore options (Helix 25.07 has no [editor.file-explorer]).
[editor.file-picker]
git-ignore = true

[keys.normal]
S-down = ["extend_to_line_bounds", "delete_selection", "paste_after"]
S-up = ["extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before"]
"C-S-c" = "yank_to_clipboard"
"C-S-v" = "paste_clipboard_after"

[keys.select]
"C-S-c" = "yank_to_clipboard"
"C-S-v" = "paste_clipboard_after"

[keys.insert]
"C-S-v" = "paste_clipboard_after"


# Space mode: file explorer (sidebar-like) + file picker + motions
[keys.normal.space]
"e" = "file_explorer"                           # File explorer at workspace root
"E" = "file_explorer_in_current_buffer_directory"  # File explorer at current file's dir
"f" = "file_picker"                            # File picker at workspace root
"F" = "file_picker_in_current_directory"      # File picker at cwd
"w" = "move_next_word_start"
"b" = "move_prev_word_start"
"g" = "collapse_selection"
"G" = "expand_selection"
"%" = "match_brackets"

[keys.select.space]
"e" = "file_explorer"
"E" = "file_explorer_in_current_buffer_directory"
"f" = "file_picker"
"F" = "file_picker_in_current_directory"
"w" = "move_next_word_start"
"b" = "move_prev_word_start"
"g" = "collapse_selection"
"G" = "expand_selection"
"%" = "match_brackets"
