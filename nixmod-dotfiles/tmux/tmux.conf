# Tmux config - bottom status bar widgets
# Works with Ghostty and other terminals

# Basics
set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1
setw -g pane-base-index 1

# Status bar (Catppuccin Macchiato - matches Waybar)
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g status-left-length 80
set -g status-right-length 120

# Left: session + windows
set -g status-left "#[fg=#c6a0f6]#{?client_prefix,⌨ ,}#[fg=#a5adcb]#S #[fg=#5b6078]│ "
set -g window-status-format "#[fg=#a5adcb]#I:#W "
set -g window-status-current-format "#[fg=#8aadf4,bold]#I:#W "
set -g window-status-separator ""

# Right: widgets (user@host, uptime, battery, time, date)
set -g status-right ""
set -ag status-right "#[fg=#a5adcb]#(whoami)@#h "
set -ag status-right "#[fg=#5b6078]│ "
set -ag status-right "#[fg=#8bd5ca]#(uptime -p 2>/dev/null | sed 's/up //' || echo '-') "
set -ag status-right "#[fg=#5b6078]│ "
set -ag status-right "#[fg=#eed49f]#(batt=\$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null); [ -n \"\$batt\" ] && echo \"\${batt}%%\" || echo '') "
set -ag status-right "#[fg=#5b6078]│ "
set -ag status-right "#[fg=#a6da95]%H:%M "
set -ag status-right "#[fg=#a5adcb]%d-%b "

# Pane border
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"

# Message style
set -g message-style "bg=#c6a0f6,fg=#181926"
